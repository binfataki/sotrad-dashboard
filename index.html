<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOTRAD SSS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#050505;
  --card:rgba(15,15,15,.88);
  --border:rgba(255,255,255,.06);
  --red:#D90429;
  --green:#00C896;
  --text:#fff;
  --muted:#9b9b9b;
}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:url('./assets/abc.png') center center/cover no-repeat;
  z-index:-2;
  transform:scale(1.05);
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.84);
  z-index:-1;
}

header{
  height:84px;
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
  position:sticky;
  top:0;
  z-index:999;
  background:rgba(0,0,0,.4);
}

.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo img{
  width:52px;
  height:52px;
  object-fit:contain;
}

.logo h1{
  font-size:20px;
  font-weight:800;
}

.logo p{
  color:var(--muted);
  font-size:12px;
  margin-top:3px;
}

.actions{
  display:flex;
  gap:12px;
}

.btn{
  border:none;
  height:46px;
  padding:0 18px;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
  color:#fff;
  background:rgba(255,255,255,.06);
}

.btn.red{
  background:var(--red);
}

.container{
  padding:26px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-bottom:24px;
}

.stat{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:22px;
  backdrop-filter:blur(14px);
}

.stat small{
  display:block;
  color:var(--muted);
  margin-bottom:10px;
}

.stat strong{
  font-size:34px;
  font-weight:800;
}

.search{
  width:100%;
  height:58px;
  border:none;
  outline:none;
  border-radius:18px;
  padding:0 18px;
  background:rgba(255,255,255,.06);
  color:#fff;
  margin-bottom:28px;
}

.section{
  margin-bottom:36px;
}

.section-title{
  font-size:22px;
  font-weight:800;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
  gap:18px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:28px;
  padding:22px;
  cursor:pointer;
  transition:.25s;
}

.card:hover{
  transform:translateY(-2px);
}

.card-top{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-bottom:22px;
}

.lot{
  font-size:25px;
  font-weight:800;
}

.client{
  margin-top:6px;
  color:#ccc;
  font-size:14px;
}

.progress{
  width:86px;
  height:86px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:conic-gradient(var(--red) calc(var(--p) * 1%), rgba(255,255,255,.08) 0);
}

.progress-inner{
  width:64px;
  height:64px;
  border-radius:50%;
  background:#080808;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

.meta-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.meta{
  background:rgba(255,255,255,.04);
  border-radius:16px;
  padding:14px;
}

.meta small{
  display:block;
  color:#999;
  margin-bottom:6px;
  font-size:11px;
}

.meta strong{
  font-size:13px;
}

.viewer{
  position:fixed;
  inset:0;
  background:#050505;
  z-index:9999;
  display:none;
  flex-direction:column;
}

.viewer.active{
  display:flex;
}

.viewer-top{
  height:84px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
}

.viewer-body{
  flex:1;
  overflow:auto;
  padding:24px;
}

.tabs{
  display:flex;
  gap:12px;
  margin-bottom:24px;
}

.tab{
  height:52px;
  padding:0 22px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.06);
  cursor:pointer;
  font-weight:800;
}

.tab.active{
  background:var(--red);
}

.workflow{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
}

.column{
  background:rgba(255,255,255,.04);
  border-radius:22px;
  padding:18px;
}

.column h3{
  margin-bottom:18px;
  font-size:15px;
}

.task{
  background:rgba(0,0,0,.35);
  border-left:4px solid #333;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.task.done{
  border-left-color:var(--green);
}

.task-title{
  font-size:13px;
  font-weight:700;
  margin-bottom:8px;
}

.signature{
  font-size:11px;
  color:var(--green);
  font-weight:700;
}

.pending{
  font-size:11px;
  color:#777;
}

.trucks{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.truck{
  background:rgba(255,255,255,.04);
  border-radius:24px;
  padding:22px;
}

.truck-top{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:20px;
  margin-bottom:22px;
}

.timeline{
  overflow-x:auto;
  padding-bottom:12px;
}

.line{
  display:flex;
  align-items:center;
  min-width:max-content;
}

.step{
  display:flex;
  align-items:center;
  gap:10px;
}

.dot{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#333;
}

.step.done .dot{
  background:var(--green);
}

.step.active .dot{
  background:var(--red);
}

.connector{
  width:70px;
  height:3px;
  background:#333;
  margin:0 12px;
}

.connector.done{
  background:var(--green);
}

.step span{
  font-size:12px;
  font-weight:700;
}

.truck-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-top:22px;
}

.info{
  background:rgba(0,0,0,.3);
  border-radius:14px;
  padding:12px;
}

.info small{
  display:block;
  color:#999;
  margin-bottom:6px;
  font-size:11px;
}

.info strong{
  font-size:13px;
}

@media(max-width:1200px){

  .workflow{
    grid-template-columns:1fr 1fr;
  }

}

@media(max-width:850px){

  .workflow{
    grid-template-columns:1fr;
  }

  .grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>
<body>

<header>

  <div class="logo">
    <img src="./assets/aaa.png">
    <div>
      <h1>SOTRAD SSS</h1>
      <p>Système de Suivi</p>
    </div>
  </div>

  <div class="actions">
    <button class="btn" onclick="settings()">⚙️ PARAMÈTRES</button>
    <button class="btn red" onclick="fetchData()">⟳ SYNCHRONISER</button>
  </div>

</header>

<div class="container">

  <div class="stats">

    <div class="stat">
      <small>Lots</small>
      <strong id="lotsCount">0</strong>
    </div>

    <div class="stat">
      <small>Camions</small>
      <strong id="truckCount">0</strong>
    </div>

    <div class="stat">
      <small>Opérations</small>
      <strong id="opsCount">0</strong>
    </div>

    <div class="stat">
      <small>Connexion</small>
      <strong id="status">OFFLINE</strong>
    </div>

  </div>

  <input id="search" class="search" placeholder="Recherche lot, client, destination...">

  <div id="content"></div>

</div>

<div class="viewer" id="viewer">

  <div class="viewer-top">

    <div>
      <h2 id="viewerTitle"></h2>
      <p id="viewerMeta" style="margin-top:6px;color:#999"></p>
    </div>

    <button class="btn" onclick="closeViewer()">✕ FERMER</button>

  </div>

  <div class="viewer-body">

    <div class="tabs">
      <div class="tab active" id="workflowTab" onclick="switchTab('workflow')">📋 WORKFLOW</div>
      <div class="tab" id="logTab" onclick="switchTab('logistique')">🚛 LOGISTIQUE</div>
    </div>

    <div id="workflowPanel"></div>
    <div id="logistiquePanel" style="display:none"></div>

  </div>

</div>

<script>

const API_URL = localStorage.getItem('SOTRAD_API_URL') || '';

const DB = {
  dossiers:[],
  operations:[],
  logistique:[],
  agents:[]
};

let CURRENT_LOT = null;

const LOGISTIC_STEPS = [
  'ENTREPOSAGE',
  'CHARGEMENT',
  'KASINDI',
  'MPONDWE',
  'KAMPALA',
  'MALABA',
  'MOMBASA'
];

async function fetchData(){

  if(!API_URL){
    alert('Ajoutez SOTRAD_API_URL');
    return;
  }

  try{

    document.getElementById('status').textContent = 'SYNC';

    const res = await fetch(API_URL);
    const json = await res.json();

    DB.dossiers = json.dossiers || [];
    DB.operations = json.operations || [];
    DB.logistique = json.logistique || [];
    DB.agents = json.agents || [];

    document.getElementById('status').textContent = 'ONLINE';

    renderDashboard();

  }catch(e){

    console.error(e);

    document.getElementById('status').textContent = 'OFFLINE';

  }

}

function renderDashboard(){

  document.getElementById('lotsCount').textContent = DB.dossiers.length;
  document.getElementById('truckCount').textContent = DB.logistique.length;
  document.getElementById('opsCount').textContent = DB.operations.length;

  const wrapper = document.getElementById('content');
  wrapper.innerHTML = '';

  const grouped = {};

  DB.dossiers.forEach(d=>{

    const key = d.date || 'Sans date';

    if(!grouped[key]) grouped[key] = [];

    grouped[key].push(d);

  });

  Object.keys(grouped).forEach(date=>{

    const section = document.createElement('div');
    section.className = 'section';

    section.innerHTML = `
      <div class="section-title">📅 ${date}</div>
      <div class="grid"></div>
    `;

    const grid = section.querySelector('.grid');

    grouped[date].forEach((lot,index)=>{

      const ops = DB.operations.filter(o=>o.lot === lot.lot);
      const trucks = DB.logistique.filter(t=>t.lot === lot.lot);

      const progress = Math.round((ops.length / 42) * 100);

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `

        <div class="card-top">

          <div>
            <div class="lot">${index+1}# ${lot.lot}</div>
            <div class="client">${lot.client || 'ESCO KIVU'}</div>
          </div>

          <div class="progress" style="--p:${progress}">
            <div class="progress-inner">${progress}%</div>
          </div>

        </div>

        <div class="meta-grid">

          <div class="meta">
            <small>Destination</small>
            <strong>${lot.destination || '-'}</strong>
          </div>

          <div class="meta">
            <small>Camions</small>
            <strong>${trucks.length}</strong>
          </div>

          <div class="meta">
            <small>Progression</small>
            <strong>${ops.length}/42</strong>
          </div>

          <div class="meta">
            <small>Statut</small>
            <strong>${progress >= 100 ? 'TERMINÉ' : 'EN COURS'}</strong>
          </div>

        </div>

      `;

      card.onclick = ()=>openLot(lot);

      grid.appendChild(card);

    });

    wrapper.appendChild(section);

  });

}

function openLot(lot){

  CURRENT_LOT = lot;

  document.getElementById('viewer').classList.add('active');

  document.getElementById('viewerTitle').textContent = lot.lot;

  document.getElementById('viewerMeta').textContent =
    `${lot.client || ''} • ${lot.provenance || ''} → ${lot.destination || ''}`;

  renderWorkflowPanel();
  renderLogistiquePanel();

}

function closeViewer(){
  document.getElementById('viewer').classList.remove('active');
}

function switchTab(type){

  document.getElementById('workflowTab').classList.remove('active');
  document.getElementById('logTab').classList.remove('active');

  if(type === 'workflow'){

    document.getElementById('workflowPanel').style.display = 'block';
    document.getElementById('logistiquePanel').style.display = 'none';

    document.getElementById('workflowTab').classList.add('active');

  }else{

    document.getElementById('workflowPanel').style.display = 'none';
    document.getElementById('logistiquePanel').style.display = 'block';

    document.getElementById('logTab').classList.add('active');

  }

}

function groupByPhase(){

  return {

    'Bureau / Conception': DB.operations.filter(o =>
      o.lot === CURRENT_LOT.lot &&
      o.task.startsWith('CONCEPTION')
    ),

    'Impression & Cachet': DB.operations.filter(o =>
      o.lot === CURRENT_LOT.lot &&
      o.task.startsWith('IMPRESSION')
    ),

    'Pré-dédouanement': DB.operations.filter(o =>
      o.lot === CURRENT_LOT.lot &&
      o.task.startsWith('TERRAIN')
    ),

    'Dédouanement': DB.operations.filter(o =>
      o.lot === CURRENT_LOT.lot &&
      o.task.startsWith('DÉDOUANEMENT')
    ),

    'Post-dédouanement': DB.operations.filter(o =>
      o.lot === CURRENT_LOT.lot &&
      o.task.startsWith('POST-DÉDO')
    )

  };

}

function renderWorkflowPanel(){

  const grouped = groupByPhase();

  let html = '<div class="workflow">';

  Object.keys(grouped).forEach(cat=>{

    html += `
      <div class="column">
        <h3>${cat}</h3>
    `;

    grouped[cat].forEach(op=>{

      html += `

        <div class="task done">

          <div class="task-title">${op.task}</div>

          <div class="signature">
            ${op.signature || `(${op.date} ${op.heure}) (${op.agentName || ''})`}
          </div>

        </div>

      `;

    });

    html += '</div>';

  });

  html += '</div>';

  document.getElementById('workflowPanel').innerHTML = html;

}

function renderLogistiquePanel(){

  const trucks = DB.logistique.filter(t=>t.lot === CURRENT_LOT.lot);

  let html = '<div class="trucks">';

  trucks.forEach(truck=>{

    const currentIndex =
      LOGISTIC_STEPS.indexOf((truck.position || '').toUpperCase());

    html += `

      <div class="truck">

        <div class="truck-top">

          <div>
            <div style="font-size:24px;font-weight:800">
              ${truck.plaque || '-'}
            </div>

            <div style="margin-top:6px;color:#ccc">
              👨 ${truck.chauffeur || '-'}
            </div>
          </div>

          <div style="
            background:#D90429;
            padding:12px 18px;
            border-radius:14px;
            font-weight:800;
          ">
            🚛 ${truck.position || 'EN ATTENTE'}
          </div>

        </div>

        <div class="timeline">

          <div class="line">

    `;

    LOGISTIC_STEPS.forEach((step,index)=>{

      const active = currentIndex === index;
      const done = currentIndex > index;

      html += `

        <div class="step ${active ? 'active' : ''} ${done ? 'done' : ''}">
          <div class="dot"></div>
          <span>${step}</span>
        </div>

      `;

      if(index < LOGISTIC_STEPS.length - 1){

        html += `
          <div class="connector ${done ? 'done' : ''}"></div>
        `;

      }

    });

    html += `

          </div>

        </div>

        <div class="truck-grid">

          <div class="info">
            <small>Destination</small>
            <strong>${truck.destination || '-'}</strong>
          </div>

          <div class="info">
            <small>Nombre sacs</small>
            <strong>${truck.nombre_sacs || truck.nombreSacs || '-'}</strong>
          </div>

          <div class="info">
            <small>Poids brut</small>
            <strong>${truck.poids_brut || truck.poidsBrut || '-'}</strong>
          </div>

          <div class="info">
            <small>Type camion</small>
            <strong>${truck.type_camion || truck.typeCamion || '-'}</strong>
          </div>

          <div class="info">
            <small>Plomb ESCO</small>
            <strong>${truck.plon_esco || truck.plombEsco || '-'}</strong>
          </div>

          <div class="info">
            <small>Téléphone</small>
            <strong>${truck.telephone || '-'}</strong>
          </div>

        </div>

      </div>

    `;

  });

  html += '</div>';

  document.getElementById('logistiquePanel').innerHTML = html;

}

function settings(){

  const url = prompt(
    'Google Apps Script URL',
    API_URL || ''
  );

  if(url){

    localStorage.setItem('SOTRAD_API_URL',url);

    location.reload();

  }

}

document.getElementById('search').addEventListener('input',e=>{

  const value = e.target.value.toLowerCase();

  document.querySelectorAll('.card').forEach(card=>{

    card.style.display =
      card.innerText.toLowerCase().includes(value)
      ? 'block'
      : 'none';

  });

});

setInterval(fetchData,30000);

fetchData();

</script>

</body>
</html>
